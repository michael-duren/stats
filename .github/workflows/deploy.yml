# Builds the container, pushes it to ECR, and triggers an AWS App Runner
# deployment. Configure these repository settings before enabling:
#
#   Variables (Settings > Variables):
#     AWS_REGION             e.g. us-east-1
#     AWS_ROLE_ARN           IAM role for GitHub OIDC (ecr push + apprunner)
#     ECR_REPO               ECR repository name, e.g. ghstats
#     APPRUNNER_SERVICE_ARN  ARN of the App Runner service
#
# The IAM role must trust token.actions.githubusercontent.com (OIDC) and allow
# ecr:GetAuthorizationToken / push and apprunner:StartDeployment.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip until AWS deployment is configured (avoids failing on first push).
    if: ${{ vars.APPRUNNER_SERVICE_ARN != '' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5

      - name: Build, tag, and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO: ${{ vars.ECR_REPO }}
          TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$REPO:$TAG" -t "$REGISTRY/$REPO:latest" .
          docker push "$REGISTRY/$REPO:$TAG"
          docker push "$REGISTRY/$REPO:latest"

      - name: Trigger App Runner deployment
        run: |
          aws apprunner start-deployment \
            --service-arn "${{ vars.APPRUNNER_SERVICE_ARN }}" \
            --region "${{ vars.AWS_REGION }}"
